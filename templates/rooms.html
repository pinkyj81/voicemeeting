<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회의실 목록 | KR-JP Voice Meeting Translator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", "Malgun Gothic", "Segoe UI", sans-serif;
      background: linear-gradient(145deg, #eef4ff 0%, #f8fbff 55%, #ecfeff 100%);
      color: #0f172a;
    }
    .wrap {
      max-width: 980px;
      margin: 30px auto;
      padding: 0 16px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      letter-spacing: -0.02em;
    }
    .desc {
      margin: 0 0 18px;
      color: #334155;
    }
    .card {
      background: #ffffff;
      border: 1px solid #cfe1ff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08);
      margin-bottom: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 180px 140px;
      gap: 10px;
      align-items: center;
    }
    input {
      width: 100%;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      font-family: inherit;
      background: #f8fbff;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      background: #1d4ed8;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    button.ghost {
      background: #e2e8f0;
      color: #0f172a;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .status {
      min-height: 20px;
      color: #334155;
      font-size: 13px;
      margin: 2px 0 6px;
    }
    .room-list {
      display: grid;
      gap: 10px;
    }
    .room-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      padding: 12px;
      background: #f8fbff;
    }
    .room-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .room-meta {
      font-size: 13px;
      color: #475569;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .empty {
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      padding: 16px;
      color: #64748b;
      background: #f8fafc;
      text-align: center;
    }
    a.enter {
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: #334155;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }
    .room-item-checkbox {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .room-item-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #1d4ed8;
    }
    .room-item.selected {
      background: #dbeafe;
      border-color: #1d4ed8;
    }
    button.delete-btn {
      background: #b91c1c;
      font-size: 13px;
      padding: 8px 12px;
    }
    button.delete-btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }
    .delete-count {
      font-size: 13px;
      color: #475569;
      margin-left: 6px;
    }
    .name-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }
    .name-modal.show {
      display: flex;
    }
    .name-modal-card {
      width: min(460px, 100%);
      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 18px 34px rgba(15, 23, 42, 0.22);
    }
    .name-modal-title {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 800;
      color: #0f172a;
    }
    .name-modal-desc {
      margin: 0 0 10px;
      color: #475569;
      font-size: 14px;
    }
    .name-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
    }
    .name-modal-error {
      min-height: 18px;
      font-size: 12px;
      color: #b91c1c;
      margin-top: 8px;
    }
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .room-item {
        grid-template-columns: 1fr;
      }
      a.enter {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>회의실 관리</h1>
    <p class="desc">회의실 생성 후 목록에서 선택하면 한일 회의 음성 번역 페이지로 입장합니다.</p>

    <section class="card">
      <h2 style="margin: 0 0 10px; font-size: 20px;">회의실 생성</h2>
      <div class="grid">
        <input id="roomName" type="text" placeholder="회의실 이름 (예: 6/19 고객사 회의)">
        <input id="createdBy" type="text" placeholder="생성자 (선택)">
        <button id="createRoomBtn">회의실 생성</button>
      </div>
      <div style="margin-top: 12px; display: flex; gap: 60px;">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; white-space: nowrap;">
          <input type="radio" id="langKoJa" name="roomLanguage" value="ko-ja" checked>
          <span style="font-size: 14px;">일본어</span>
        </label>
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; white-space: nowrap;">
          <input type="radio" id="langKoEn" name="roomLanguage" value="ko-en">
          <span style="font-size: 14px;">영어</span>
        </label>
      </div>
      <p class="status" id="createStatus"></p>
    </section>

    <section class="card">
      <div class="toolbar">
        <h2 style="margin: 0; font-size: 20px;">회의실 목록</h2>
        <div style="display: flex; gap: 8px; align-items: center;">
          <button id="refreshBtn" class="ghost">새로고침</button>
          <button id="deleteSelectedBtn" class="delete-btn" disabled>
            선택 삭제
            <span id="deleteCount" class="delete-count"></span>
          </button>
        </div>
      </div>
      <div id="roomList" class="room-list"></div>
    </section>
  </div>

  <div id="nameModal" class="name-modal" aria-hidden="true">
    <div class="name-modal-card" role="dialog" aria-modal="true" aria-labelledby="nameModalTitle">
      <h3 id="nameModalTitle" class="name-modal-title">입장 이름 입력</h3>
      <p class="name-modal-desc">회의실에서 표시할 이름을 입력해주세요.</p>
      <input id="nameModalInput" type="text" maxlength="40" placeholder="예: 홍길동" list="nameSuggestions">
      <datalist id="nameSuggestions"></datalist>
      <div id="nameModalError" class="name-modal-error"></div>
      <div class="name-modal-actions">
        <button id="nameModalCancel" class="ghost" type="button">취소</button>
        <button id="nameModalConfirm" type="button">입장하기</button>
      </div>
    </div>
  </div>

  <script>
    const roomNameInput = document.getElementById('roomName');
    const createdByInput = document.getElementById('createdBy');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const createStatus = document.getElementById('createStatus');
    const refreshBtn = document.getElementById('refreshBtn');
    const roomList = document.getElementById('roomList');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const deleteCount = document.getElementById('deleteCount');
    const nameModal = document.getElementById('nameModal');
    const nameModalInput = document.getElementById('nameModalInput');
    const nameSuggestions = document.getElementById('nameSuggestions');
    const nameModalError = document.getElementById('nameModalError');
    const nameModalCancel = document.getElementById('nameModalCancel');
    const nameModalConfirm = document.getElementById('nameModalConfirm');
    let pendingRoomCode = '';
    let loadedNames = false;
    let selectedRoomCodes = new Set();

    function setCreateStatus(text, isError = false) {
      createStatus.textContent = text;
      createStatus.style.color = isError ? '#b91c1c' : '#334155';
    }

    function renderNameSuggestions(names) {
      const unique = [...new Set((names || []).map((item) => String(item || '').trim()).filter(Boolean))];
      nameSuggestions.innerHTML = unique.map((name) => `<option value="${escapeHtml(name)}"></option>`).join('');
    }

    async function loadNameSuggestions() {
      if (loadedNames) {
        return;
      }
      try {
        const response = await fetch('/api/speakers');
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || '이름 목록을 불러오지 못했습니다.');
        }
        renderNameSuggestions(data.names || []);
        loadedNames = true;
      } catch (_) {
        // 이름 목록 로딩 실패 시에도 직접 입력은 가능하도록 무시
      }
    }

    function renderRooms(rooms) {
      if (!rooms.length) {
        roomList.innerHTML = '<div class="empty">생성된 회의실이 없습니다. 상단에서 먼저 회의실을 만들어주세요.</div>';
        return;
      }

      roomList.innerHTML = rooms.map((room) => {
        const createdBy = room.created_by ? `생성자: ${escapeHtml(room.created_by)}` : '생성자: -';
        const createdAt = room.created_at ? `생성일시: ${escapeHtml(room.created_at)}` : '';
        const languageDisplay = room.language === 'ko-en' ? '영어' : '일본어';
        const isSelected = selectedRoomCodes.has(room.room_code);
        return `
          <div class="room-item${isSelected ? ' selected' : ''}" data-room-code="${escapeHtml(room.room_code)}">
            <div class="room-item-checkbox">
              <input type="checkbox" class="room-checkbox" data-room-code="${escapeHtml(room.room_code)}"${isSelected ? ' checked' : ''}>
              <div>
                <div class="room-title">${escapeHtml(room.room_name)} <span style="font-size:13px; color:#475569;">(#${escapeHtml(room.room_code)})</span></div>
                <div class="room-meta">
                  <span>${createdBy}</span>
                  <span>${createdAt}</span>
                  <span style="color: #1d4ed8; font-weight: 600;">언어: ${languageDisplay}</span>
                </div>
              </div>
            </div>
            <a class="enter" href="#" data-room-code="${escapeHtml(room.room_code)}">입장하기</a>
          </div>
        `;
      }).join('');
    }

    async function openNameModal(roomCode) {
      pendingRoomCode = roomCode;
      nameModalError.textContent = '';
      nameModalInput.value = localStorage.getItem('meeting_display_name') || '';
      await loadNameSuggestions();
      nameModal.classList.add('show');
      nameModal.setAttribute('aria-hidden', 'false');
      setTimeout(() => {
        nameModalInput.focus();
        nameModalInput.select();
      }, 0);
    }

    function closeNameModal() {
      pendingRoomCode = '';
      nameModal.classList.remove('show');
      nameModal.setAttribute('aria-hidden', 'true');
      nameModalError.textContent = '';
    }

    function confirmNameAndEnter() {
      const normalized = String(nameModalInput.value || '').trim().slice(0, 40);
      if (!normalized) {
        nameModalError.textContent = '이름을 입력해야 입장할 수 있습니다.';
        nameModalInput.focus();
        return;
      }
      if (!pendingRoomCode) {
        closeNameModal();
        return;
      }
      localStorage.setItem('meeting_display_name', normalized);
      const target = `/meeting/${encodeURIComponent(pendingRoomCode)}?name=${encodeURIComponent(normalized)}`;
      closeNameModal();
      window.location.href = target;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function loadRooms() {
      roomList.innerHTML = '<div class="empty">회의실 목록을 불러오는 중...</div>';
      try {
        const response = await fetch('/api/rooms');
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || '회의실 목록을 불러오지 못했습니다.');
        }
        renderRooms(data.rooms || []);
      } catch (error) {
        roomList.innerHTML = `<div class="empty" style="color:#b91c1c;">${escapeHtml(error.message)}</div>`;
      }
    }

    async function createRoom() {
      const roomName = roomNameInput.value.trim();
      const createdBy = createdByInput.value.trim();
      const language = document.querySelector('input[name="roomLanguage"]:checked').value;

      if (!roomName) {
        setCreateStatus('회의실 이름을 입력해주세요.', true);
        roomNameInput.focus();
        return;
      }

      createRoomBtn.disabled = true;
      setCreateStatus('회의실 생성 중...');

      try {
        const response = await fetch('/api/rooms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ room_name: roomName, created_by: createdBy, language: language })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || '회의실 생성 실패');
        }

        setCreateStatus(`생성 완료: #${data.room_code} ${data.room_name}`);
        roomNameInput.value = '';
        await loadRooms();
      } catch (error) {
        setCreateStatus(error.message || '회의실 생성 실패', true);
      } finally {
        createRoomBtn.disabled = false;
      }
    }

    function updateDeleteButtonState() {
      const count = selectedRoomCodes.size;
      deleteSelectedBtn.disabled = count === 0;
      deleteCount.textContent = count > 0 ? `(${count})` : '';
    }

    async function deleteSelectedRooms() {
      if (selectedRoomCodes.size === 0) {
        return;
      }

      const codes = Array.from(selectedRoomCodes);
      const confirmMsg = `${codes.length}개의 회의실을 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`;
      if (!confirm(confirmMsg)) {
        return;
      }

      deleteSelectedBtn.disabled = true;
      try {
        const response = await fetch('/api/rooms', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ room_codes: codes })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || '삭제 실패');
        }

        selectedRoomCodes.clear();
        updateDeleteButtonState();
        await loadRooms();
        alert('선택된 회의실이 삭제되었습니다.');
      } catch (error) {
        alert(`삭제 중 오류: ${error.message}`);
      } finally {
        deleteSelectedBtn.disabled = false;
      }
    }
    createRoomBtn.addEventListener('click', createRoom);
    deleteSelectedBtn.addEventListener('click', deleteSelectedRooms);
    roomList.addEventListener('change', (event) => {
      const checkbox = event.target.closest('input[type="checkbox"].room-checkbox');
      if (!checkbox) {
        return;
      }
      const roomCode = checkbox.getAttribute('data-room-code');
      if (!roomCode) {
        return;
      }
      if (checkbox.checked) {
        selectedRoomCodes.add(roomCode);
        checkbox.closest('.room-item').classList.add('selected');
      } else {
        selectedRoomCodes.delete(roomCode);
        checkbox.closest('.room-item').classList.remove('selected');
      }
      updateDeleteButtonState();
    });
    roomList.addEventListener('click', (event) => {
      const enterLink = event.target.closest('a.enter[data-room-code]');
      if (!enterLink) {
        return;
      }
      event.preventDefault();
      const roomCode = enterLink.getAttribute('data-room-code');
      if (!roomCode) {
        return;
      }
      openNameModal(roomCode);
    });

    nameModalConfirm.addEventListener('click', confirmNameAndEnter);
    nameModalCancel.addEventListener('click', closeNameModal);
    nameModalInput.addEventListener('keypress', (event) => {
      if (event.key === 'Enter') {
        confirmNameAndEnter();
      }
    });
    nameModal.addEventListener('click', (event) => {
      if (event.target === nameModal) {
        closeNameModal();
      }
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && nameModal.classList.contains('show')) {
        closeNameModal();
      }
    });

    roomNameInput.addEventListener('keypress', (event) => {
      if (event.key === 'Enter') createRoom();
    });

    refreshBtn.addEventListener('click', () => {
      selectedRoomCodes.clear();
      updateDeleteButtonState();
      loadRooms();
    });

    loadRooms();
    loadNameSuggestions();
  </script>
</body>
</html>
